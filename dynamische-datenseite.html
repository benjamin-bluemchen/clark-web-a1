<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Dynamische Datenseite</title>
</head>
<body>

  <h1>Dynamische Datenseite</h1>

  <h2>Linzer Stadtteile</h2>
  <ul id="liste-linz"></ul>




  <h2>User-Namen</h2>
  <ul id="service-liste"></ul>

  <script>
    const stadtteile = ["Urfahr", "Innere Stadt", "Bindermichel", "Benjamin", "Elisabeth"];
    const liste = document.getElementById("liste-linz");
    stadtteile.forEach(s => {
      let li = document.createElement("li");
      li.textContent = s;
      liste.appendChild(li);
    });
  </script>

  <script>
    fetch('https://jsonplaceholder.typicode.com/users')
      .then(response => response.json())
      .then(data => {
        const sListe = document.getElementById("service-liste");
        data.forEach(user => {
          let li = document.createElement("li");
          li.textContent = "User: " + user.name;
          sListe.appendChild(li);
        });
      });
  </script>

</body>
</html>
